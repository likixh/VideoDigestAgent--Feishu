{% extends "base.html" %}
{% block title %}{{ filename }}{% endblock %}

{% block content %}
<div class="d-flex align-items-center mb-4">
    <a href="{{ url_for('archive_page') }}" class="btn btn-sm btn-outline-secondary me-3">
        <i class="bi bi-arrow-left"></i> Back
    </a>
    <h1 class="page-title mb-0" style="font-size: 1.2rem;">{{ filename }}</h1>
</div>

<div class="summary-content" id="summaryContent"></div>
{% endblock %}

{% block scripts %}
<!-- Use marked.js to render markdown -->
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script>
const raw = {{ content | tojson }};
document.getElementById('summaryContent').innerHTML = marked.parse(raw);
</script>
{% endblock %}
